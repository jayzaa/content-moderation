<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moderation Log Dashboard</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0f1115;
        color: #e6e6e6;
        min-height: 100vh;
        padding: 2rem 1rem;
      }

      .header {
        max-width: 72rem;
        margin: 0 auto 2rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        flex-wrap: wrap;
      }
      .header h1 { font-size: 1.5rem; flex: 1; }
      .header a {
        color: #9aa4b2;
        font-size: 0.875rem;
        text-decoration: none;
      }
      .header a:hover { color: #e6e6e6; }

      /* Stats row */
      .stats {
        max-width: 72rem;
        margin: 0 auto 1.5rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 0.75rem;
      }
      .stat-card {
        background: #161922;
        border-radius: 10px;
        padding: 1rem 1.25rem;
        border: 1px solid #2a2f3a;
      }
      .stat-card .label { font-size: 0.75rem; color: #9aa4b2; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
      .stat-card .value { font-size: 1.75rem; font-weight: 700; }
      .stat-card .value.red   { color: #f87171; }
      .stat-card .value.green { color: #4ade80; }
      .stat-card .value.blue  { color: #60a5fa; }
      .stat-card .value.amber { color: #fbbf24; }

      /* Toolbar */
      .toolbar {
        max-width: 72rem;
        margin: 0 auto 1rem;
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .toolbar select, .toolbar input[type="search"] {
        padding: 0.4rem 0.7rem;
        background: #161922; border: 1px solid #2a2f3a;
        border-radius: 6px; color: #e6e6e6; font-size: 0.875rem;
      }
      .toolbar button {
        padding: 0.4rem 1rem; background: #1e2330; color: #e6e6e6;
        border: 1px solid #2a2f3a; border-radius: 6px; cursor: pointer; font-size: 0.875rem;
      }
      .toolbar button:hover { background: #2a3142; }
      .toolbar button.primary { background: #3b82f6; border-color: #3b82f6; color: #fff; }
      .toolbar button.primary:hover { background: #2563eb; }
      .toolbar .spacer { flex: 1; }

      /* Table */
      .table-wrap {
        max-width: 72rem;
        margin: 0 auto;
        background: #161922;
        border-radius: 12px;
        border: 1px solid #2a2f3a;
        overflow: hidden;
      }
      table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
      thead th {
        padding: 0.75rem 1rem;
        text-align: left;
        color: #9aa4b2;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: #0f1115;
        border-bottom: 1px solid #2a2f3a;
        cursor: pointer;
        user-select: none;
      }
      thead th:hover { color: #e6e6e6; }
      thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
      thead th.sorted .sort-icon { opacity: 1; }

      tbody tr {
        border-bottom: 1px solid #1e2330;
        cursor: pointer;
        transition: background 0.1s;
      }
      tbody tr:last-child { border-bottom: none; }
      tbody tr:hover { background: #1e2330; }
      tbody tr.active { background: #1e2a40; }

      td { padding: 0.75rem 1rem; vertical-align: middle; }
      td.ts { color: #9aa4b2; font-size: 0.8rem; white-space: nowrap; }
      td.filename { font-family: monospace; max-width: 14rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      .badge {
        display: inline-flex; align-items: center;
        padding: 0.2rem 0.55rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .badge.image    { background: #1e3a5f; color: #93c5fd; }
      .badge.video    { background: #2d1f5e; color: #c4b5fd; }
      .badge.ok       { background: #1d3b2a; color: #86efac; }
      .badge.error    { background: #4c1d1d; color: #fca5a5; }
      .badge.high     { background: #4c1d1d; color: #fca5a5; }
      .badge.medium   { background: #3d2d0e; color: #fcd34d; }
      .badge.low      { background: #1d3b2a; color: #86efac; }
      .badge.none     { background: #1d2939; color: #9aa4b2; }
      .badge.flagged  { background: #4c1d1d; color: #fca5a5; }
      .badge.passed   { background: #1d3b2a; color: #86efac; }

      /* Detail panel */
      .detail-panel {
        max-width: 72rem;
        margin: 1rem auto 0;
        background: #161922;
        border-radius: 12px;
        border: 1px solid #2a2f3a;
        display: none;
      }
      .detail-panel.open { display: block; }
      .detail-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid #2a2f3a;
        flex-wrap: wrap;
      }
      .detail-header h3 { font-size: 0.95rem; flex: 1; }
      .detail-header button {
        background: none; border: none; color: #9aa4b2;
        cursor: pointer; font-size: 1.25rem; padding: 0 0.25rem;
      }
      .detail-header button:hover { color: #e6e6e6; }
      .detail-tabs {
        display: flex;
        border-bottom: 1px solid #2a2f3a;
      }
      .detail-tab {
        padding: 0.6rem 1.25rem;
        font-size: 0.875rem;
        cursor: pointer;
        color: #9aa4b2;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
      }
      .detail-tab:hover { color: #e6e6e6; }
      .detail-tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
      .detail-body { padding: 1.25rem; }
      .detail-body pre {
        background: #0d0f14;
        border-radius: 8px;
        padding: 1rem;
        overflow: auto;
        max-height: 26rem;
        font-size: 0.8rem;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.5;
      }

      /* Summary view */
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      .summary-item { background: #0d0f14; border-radius: 8px; padding: 0.75rem 1rem; }
      .summary-item .key { font-size: 0.75rem; color: #6b7280; margin-bottom: 0.25rem; }
      .summary-item .val { font-size: 0.95rem; font-weight: 600; }

      .label-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
      .chip {
        display: inline-flex; align-items: center; gap: 0.3rem;
        padding: 0.25rem 0.6rem;
        background: #0d0f14; border: 1px solid #2a2f3a;
        border-radius: 20px; font-size: 0.78rem;
      }
      .chip .conf { color: #9aa4b2; }

      /* Empty / loading */
      .empty {
        text-align: center;
        padding: 3rem 1rem;
        color: #6b7280;
        font-size: 0.9rem;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .hide-sm { display: none; }
      }
    </style>
  </head>
  <body>

    <div class="header">
      <h1>📊 Moderation Log Dashboard</h1>
      <a href="/">← Back to upload</a>
    </div>

    <div class="stats" id="stats">
      <div class="stat-card"><div class="label">Total</div><div class="value blue" id="s-total">—</div></div>
      <div class="stat-card"><div class="label">Flagged</div><div class="value red" id="s-flagged">—</div></div>
      <div class="stat-card"><div class="label">Passed</div><div class="value green" id="s-passed">—</div></div>
      <div class="stat-card"><div class="label">Images</div><div class="value blue" id="s-images">—</div></div>
      <div class="stat-card"><div class="label">Videos</div><div class="value amber" id="s-videos">—</div></div>
      <div class="stat-card"><div class="label">Errors</div><div class="value red" id="s-errors">—</div></div>
    </div>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Search filename…" oninput="applyFilters()" style="width:200px" />
      <select id="filter-kind" onchange="applyFilters()">
        <option value="">All types</option>
        <option value="image">Image</option>
        <option value="video">Video</option>
      </select>
      <select id="filter-status" onchange="applyFilters()">
        <option value="">All status</option>
        <option value="ok">OK</option>
        <option value="error">Error</option>
      </select>
      <select id="filter-risk" onchange="applyFilters()">
        <option value="">All risk</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
        <option value="none">None / Passed</option>
      </select>
      <span class="spacer"></span>
      <button class="primary" onclick="refresh()">↻ Refresh</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('timestamp')" data-col="timestamp">Time <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('kind')"      data-col="kind">Type <span class="sort-icon">↕</span></th>
            <th>Filename</th>
            <th onclick="sortBy('status')"   data-col="status">Status <span class="sort-icon">↕</span></th>
            <th>Risk</th>
            <th class="hide-sm">Result</th>
          </tr>
        </thead>
        <tbody id="log-rows">
          <tr><td colspan="6" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="detail-panel" id="detail-panel">
      <div class="detail-header">
        <h3 id="detail-title">Log detail</h3>
        <button onclick="closeDetail()" title="Close">✕</button>
      </div>
      <div class="detail-tabs">
        <button class="detail-tab active" onclick="switchTab('summary', this)">Summary</button>
        <button class="detail-tab" onclick="switchTab('raw', this)">Raw JSON</button>
      </div>
      <div class="detail-body">
        <div id="tab-summary"></div>
        <div id="tab-raw" style="display:none"><pre id="raw-json"></pre></div>
      </div>
    </div>

    <script>
    // --- State ----------------------------------------------------------------
    let allRecords = [];
    let allDetails = {};
    let filtered = [];
    let sortCol = 'timestamp';
    let sortDir = -1;
    let activeFile = null;

    // --- Fetch ----------------------------------------------------------------
    async function refresh() {
      document.getElementById('log-rows').innerHTML =
        '<tr><td colspan="6" class="empty">Loading…</td></tr>';
      try {
        const res = await fetch('/api/logs');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        allRecords = await res.json();
        await Promise.all(allRecords.map(r => loadDetail(r.file)));
        applyFilters();
      } catch (e) {
        document.getElementById('log-rows').innerHTML =
          `<tr><td colspan="6" class="empty">Failed to load: ${e.message}</td></tr>`;
      }
    }

    async function loadDetail(file) {
      if (allDetails[file]) return allDetails[file];
      try {
        const res = await fetch('/api/logs/' + encodeURIComponent(file));
        if (!res.ok) return null;
        const d = await res.json();
        allDetails[file] = d;
        return d;
      } catch { return null; }
    }

    // --- Filter & sort --------------------------------------------------------
    function applyFilters() {
      const q     = document.getElementById('search').value.toLowerCase();
      const kind  = document.getElementById('filter-kind').value;
      const status= document.getElementById('filter-status').value;
      const risk  = document.getElementById('filter-risk').value;

      filtered = allRecords.filter(r => {
        if (q && !(r.filename || '').toLowerCase().includes(q)) return false;
        if (kind   && r.kind   !== kind)   return false;
        if (status && r.status !== status) return false;
        if (risk) {
          const d = allDetails[r.file];
          const rv = getRiskLevel(r, d);
          if (risk === 'none') {
            if (rv && rv !== 'none') return false;
          } else {
            if (rv !== risk) return false;
          }
        }
        return true;
      });

      sortFiltered();
      renderStats();
      renderTable();
    }

    function sortBy(col) {
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = -1; }
      document.querySelectorAll('thead th').forEach(th => {
        th.classList.toggle('sorted', th.dataset.col === col);
      });
      sortFiltered();
      renderTable();
    }

    function sortFiltered() {
      filtered.sort((a, b) => {
        let va = a[sortCol] || '', vb = b[sortCol] || '';
        if (sortCol === 'timestamp') { va = new Date(va); vb = new Date(vb); }
        return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
      });
    }

    // --- Risk helpers ---------------------------------------------------------
    function getRiskLevel(r, detail) {
      if (!detail) return null;
      const s = detail.summary;
      if (!s) return null;
      return s.riskLevel || null;
    }

    function isPassed(r, detail) {
      if (!detail) return null;
      return detail.summary && detail.summary.passed != null
        ? detail.summary.passed : null;
    }

    function getLabels(r, detail) {
      if (!detail || !detail.summary) return [];
      const s = detail.summary;
      if (r.kind === 'video') {
        return [...(s.frameLabels || []), ...(s.audioLabels || [])];
      }
      return s.labels || [];
    }

    // --- Render stats ---------------------------------------------------------
    function renderStats() {
      // Use allRecords for global counts, filtered for display context
      const all = allRecords;
      const details = all.map(r => allDetails[r.file]);
      const flagged = all.filter((r, i) => isPassed(r, details[i]) === false).length;
      const passed  = all.filter((r, i) => isPassed(r, details[i]) === true).length;
      document.getElementById('s-total').textContent  = all.length;
      document.getElementById('s-flagged').textContent= flagged;
      document.getElementById('s-passed').textContent = passed;
      document.getElementById('s-images').textContent = all.filter(r => r.kind === 'image').length;
      document.getElementById('s-videos').textContent = all.filter(r => r.kind === 'video').length;
      document.getElementById('s-errors').textContent = all.filter(r => r.status === 'error').length;
    }

    // --- Render table ---------------------------------------------------------
    function renderTable() {
      const tbody = document.getElementById('log-rows');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No records match.</td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map(r => {
        const d = allDetails[r.file];
        const risk = getRiskLevel(r, d);
        const passed = isPassed(r, d);
        const labels = getLabels(r, d);
        const ts = new Date(r.timestamp).toLocaleString();
        const verdict = passed === true ? 'passed' : passed === false ? 'flagged' : '';

        return `<tr onclick="openDetail('${r.file}')" class="${activeFile === r.file ? 'active' : ''}">
          <td class="ts">${ts}</td>
          <td><span class="badge ${r.kind}">${r.kind}</span></td>
          <td class="filename" title="${r.filename || ''}">${r.filename || '—'}</td>
          <td><span class="badge ${r.status}">${r.status}</span></td>
          <td>${risk ? `<span class="badge ${risk}">${risk}</span>` : '—'}</td>
          <td class="hide-sm">
            ${verdict ? `<span class="badge ${verdict}">${verdict}</span> ` : ''}
            ${labels.slice(0, 2).map(l => `<span class="badge" style="font-weight:400;font-size:0.72rem">${l.label}</span>`).join(' ')}
            ${labels.length > 2 ? `<span class="badge" style="opacity:0.6">+${labels.length - 2}</span>` : ''}
          </td>
        </tr>`;
      }).join('');
    }

    // --- Detail panel ---------------------------------------------------------
    async function openDetail(file) {
      activeFile = file;
      renderTable(); // re-render to highlight active row

      const detail = await loadDetail(file);
      if (!detail) return;

      const r = allRecords.find(x => x.file === file);
      document.getElementById('detail-title').textContent =
        `${(r && r.filename) || file} — ${new Date((r && r.timestamp) || '').toLocaleString()}`;

      // Build summary tab
      const s = detail.summary || {};
      const labels = getLabels(r || {}, detail);
      const passed = s.passed;
      const risk   = s.riskLevel || '—';

      document.getElementById('tab-summary').innerHTML = `
        <div class="summary-grid">
          <div class="summary-item">
            <div class="key">Verdict</div>
            <div class="val">${passed === true
              ? '<span class="badge passed">✓ Passed</span>'
              : passed === false
                ? '<span class="badge flagged">⚠ Flagged</span>'
                : '—'}</div>
          </div>
          <div class="summary-item">
            <div class="key">Risk level</div>
            <div class="val">${risk !== '—' ? `<span class="badge ${risk}">${risk}</span>` : '—'}</div>
          </div>
          <div class="summary-item">
            <div class="key">Type</div>
            <div class="val">${r ? `<span class="badge ${r.kind}">${r.kind}</span>` : '—'}</div>
          </div>
          <div class="summary-item">
            <div class="key">Status</div>
            <div class="val">${r ? `<span class="badge ${r.status}">${r.status}</span>` : '—'}</div>
          </div>
        </div>
        ${s.message ? `<p style="color:#9aa4b2;font-size:0.85rem;margin-bottom:0.75rem">${s.message}</p>` : ''}
        ${labels.length > 0 ? `
          <p style="font-size:0.8rem;color:#6b7280;margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em">Detected labels</p>
          <div class="label-chips">
            ${labels.map(l => `
              <div class="chip">
                <span>${l.label}</span>
                ${l.riskLevel ? `<span class="badge ${l.riskLevel}" style="padding:0.1rem 0.35rem;font-size:0.7rem">${l.riskLevel}</span>` : ''}
                ${l.confidence ? `<span class="conf">${l.confidence.toFixed ? l.confidence.toFixed(1) : l.confidence}%</span>` : ''}
              </div>
            `).join('')}
          </div>
        ` : '<p style="color:#6b7280;font-size:0.85rem">No labels detected.</p>'}
      `;

      // Raw JSON tab
      document.getElementById('raw-json').textContent = JSON.stringify(detail, null, 2);

      // Show panel, reset to summary tab
      document.getElementById('detail-panel').classList.add('open');
      switchTab('summary', document.querySelector('.detail-tab'));
      document.getElementById('detail-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function closeDetail() {
      activeFile = null;
      document.getElementById('detail-panel').classList.remove('open');
      renderTable();
    }

    function switchTab(name, btn) {
      document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-summary').style.display = name === 'summary' ? '' : 'none';
      document.getElementById('tab-raw').style.display      = name === 'raw'     ? '' : 'none';
    }

    // --- Init -----------------------------------------------------------------
    refresh();
    </script>
  </body>
</html>
