services:

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: image-detection:local
    restart: unless-stopped
    # Backend is NOT exposed to the host — only nginx talks to it.
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      # Bind to all interfaces inside the container so nginx can reach it.
      - LISTEN_ADDR=0.0.0.0:8080
      # Credential file path inside the container (bind-mounted below).
      - GCS_CREDENTIALS_FILE=/run/secrets/gcs-service-account.json
    volumes:
      # Mount the GCS service account key read-only.
      - ./credentials/media-detection.json:/run/secrets/gcs-service-account.json:ro
      # Persist request logs on the host.
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
