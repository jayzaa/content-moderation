services:
  image-detection:
    build:
      context: .
      dockerfile: Dockerfile
    image: image-detection:local
    restart: unless-stopped
    ports:
      # Host:container. Change the host port if 8080 is already in use.
      - "8080:8080"
    env_file:
      # Copy .env.example to .env and fill in real values before running.
      # This loads ALL variables from .env into the container, including
      # the Alibaba Cloud Content Moderation credentials/endpoint config:
      #   ALIBABA_CLOUD_ACCESS_KEY_ID
      #   ALIBABA_CLOUD_ACCESS_KEY_SECRET
      #   ALIBABA_CLOUD_REGION_ID   (selects the Green/CIP endpoint, e.g.
      #                              ap-southeast-1 -> green-cip.ap-southeast-1.aliyuncs.com;
      #                              see internal/moderation/client.go)
      # No Alibaba-specific overrides are needed below — .env is sufficient.
      - .env
    environment:
      # Inside the container, bind to all interfaces so the port mapping
      # above works — LISTEN_ADDR in .env is meant for bare-metal/systemd
      # runs where the app should stay on localhost. Overriding it here
      # takes precedence over whatever LISTEN_ADDR is set to in .env.
      - LISTEN_ADDR=0.0.0.0:8080
      # GCS_CREDENTIALS_FILE from .env should point at this in-container
      # path; the actual key file is bind-mounted below.
      - GCS_CREDENTIALS_FILE=/run/secrets/gcs-service-account.json
    volumes:
      # Mount your real GCP service account JSON key read-only. Set the
      # left-hand path to wherever the key actually lives on the host —
      # never bake it into the image or commit it to the repo.
      - ${GCS_CREDENTIALS_FILE_HOST:-./secrets/gcs-service-account.json}:/run/secrets/gcs-service-account.json:ro
      # Persist request logs outside the container. The container runs as
      # UID 1000 (the common default first-user UID on most Linux distros)
      # so this bind mount works read/write out of the box in the common
      # case. If your host's user has a different UID, either chown this
      # directory to 1000 or set `user: "<your-uid>:<your-gid>"` below.
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
